type: panel
path: map-be-new
title: CUBE
icon: mdi:cube
theme: green_dark_theme
cards:
  - type: vertical-stack
    cards:
      - type: custom:navbar-card
        routes:
          - url: /lovelace/default_view
            label: HOME
            icon: mdi:home
            selected_color: none
          - url: /mapa-de-luzes
            label: LUZES
            icon: mdi:lightbulb
          - url: /temperatura-2d-vertical
            label: TEMPERATURA
            icon: mdi:thermometer
          - url: /umidade-2d-vertical
            label: UMIDADE
            icon: mdi:water
          - url: /mapa-de-eletricidade
            label: ELETRICIDADE
            icon: mdi:flash
          - url: /3d-dashboard
            label: 3D
            icon: mdi:cube
            icon_color: "#b8fcff"
            selected_color: none
        haptic:
          url: true
          tap_action: true
          hold_action: true
          double_tap_action: true
        desktop:
          position: left
        styles: |
          @keyframes float-hover {
            0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-8px) scale(1.08); opacity: 0.95; }
          }
          .navbar-card {
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22) !important;
          }
          .route {
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          }
          .route ha-icon {
            --mdc-icon-size: 38px;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
            filter:
              drop-shadow(1px 2px 2px rgba(0,0,0,0.6))
              drop-shadow(3px 6px 8px rgba(0,0,0,0.4))
              drop-shadow(6px 12px 16px rgba(0,0,0,0.25));
          }
          .route:last-child {
            background: linear-gradient(145deg, #80f0ff, #40b8cc);
            border: 1px solid rgba(0, 180, 210, 0.6);
            border-radius: 12px;
            box-shadow:
              6px 6px 12px rgba(0,0,0,0.35),
              -4px -4px 10px rgba(255,255,255,0.25),
              inset 2px 2px 4px rgba(255,255,255,0.4),
              inset -2px -2px 4px rgba(0,0,0,0.15);
            margin: 4px;
            padding: 2px;
          }
          .route:last-child:hover {
            background: linear-gradient(145deg, #90f5ff, #50c2d5);
            border-color: rgba(0, 200, 230, 0.8);
            box-shadow:
              4px 4px 8px rgba(0,0,0,0.3),
              -2px -2px 6px rgba(255,255,255,0.3),
              inset 3px 3px 6px rgba(255,255,255,0.5),
              inset -3px -3px 6px rgba(0,0,0,0.2),
              0 0 15px rgba(0, 229, 255, 0.5);
          }
          .route:last-child ha-icon {
            animation: float-hover 3s ease-in-out infinite;
            animation-delay: 2.5s;
          }  /* 3D - Cyan Neon 🧊 (ATIVO) */
          .route:last-child {
            background: linear-gradient(145deg, #80f0ff, #40b8cc);
            border: 1px solid rgba(0, 180, 210, 0.6);
            border-radius: 12px;
            box-shadow:
              6px 6px 12px rgba(0, 0, 0, 0.35),
              -4px -4px 10px rgba(255, 255, 255, 0.25),
              inset 2px 2px 4px rgba(255, 255, 255, 0.4),
              inset -2px -2px 4px rgba(0, 0, 0, 0.15);
            margin: 4px;
            padding: 2px;
          }
          .route:last-child:hover {
            background: linear-gradient(145deg, #90f5ff, #50c2d5);
            border-color: rgba(0, 200, 230, 0.8);
            box-shadow:
              4px 4px 8px rgba(0, 0, 0, 0.3),
              -2px -2px 6px rgba(255, 255, 255, 0.3),
              inset 3px 3px 6px rgba(255, 255, 255, 0.5),
              inset -3px -3px 6px rgba(0, 0, 0, 0.2),
              0 0 15px rgba(0, 229, 255, 0.5);
          }
          .route:last-child ha-icon {
            animation: float-hover 3s ease-in-out infinite;
            animation-delay: 2.5s;
          }
          /* 3D - Cyan Neon 🧊 (ATIVO) — nth-child(7) = 6ª rota + 1 offset */
          .route:nth-child(7) {
            background: linear-gradient(145deg, #80f0ff, #40b8cc);
            border: 1px solid rgba(0, 180, 210, 0.6);
            border-radius: 12px;
          }
