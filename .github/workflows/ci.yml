name: CI

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - release

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run rollup

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: floor3d-card-dist
          path: dist/floor3d-card.js
          retention-days: 7
