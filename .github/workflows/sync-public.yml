name: Sync master to public repo

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push to public repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clone public repo
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/visaodeempresa/floor3d-card-releases.git /tmp/public-repo

          cd /tmp/public-repo

          # Copy files
          cp $GITHUB_WORKSPACE/dist/new-floor3d-card.js .
          cp $GITHUB_WORKSPACE/README.md .
          cp $GITHUB_WORKSPACE/hacs.json .
          cp $GITHUB_WORKSPACE/package.json .

          git add -A
          git diff --staged --quiet || git commit -m "sync: master from private repo - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
